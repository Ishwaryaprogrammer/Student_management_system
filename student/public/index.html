<!DOCTYPE html>
<html>
<head>
<title>Student Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#667eea,#764ba2);
    color:white;
    transition:0.3s;
}

.dark{
    background:#121212 !important;
    color:#eee !important;
}

.card{border-radius:15px;}
.table{background:white;}
.dark .table{background:#1e1e1e;color:white;}

</style>
</head>

<body>

<div class="container mt-5">

<div id="loginBox" class="card p-4 mx-auto" style="max-width:350px;">
<h3 class="text-dark text-center">Admin Login</h3>
<input id="u" class="form-control mb-2" placeholder="Username">
<input id="p" type="password" class="form-control mb-3" placeholder="Password">
<button class="btn btn-dark w-100" onclick="login()">Login</button>
<p id="err" class="text-danger text-center"></p>
</div>

<div id="app" style="display:none">

<h2 class="text-center mb-3">🎓 Student Management</h2>

<div class="d-flex justify-content-between mb-2">
<h5>Total: <span id="count">0</span></h5>
<button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
</div>

<div class="d-flex gap-2 mb-3 flex-wrap">
<input class="form-control" placeholder="Search..." onkeyup="search(this.value)">

<select class="form-select" onchange="changeSort(this.value)">
<option value="name">Sort Name</option>
<option value="age">Sort Age</option>
</select>

<select class="form-select" onchange="filterDept(this.value)">
<option value="">All</option>
<option>IT</option>
<option>CSE</option>
<option>ECE</option>
</select>

<button class="btn btn-success" onclick="exportCSV()">Export</button>
<button class="btn btn-secondary" onclick="toggleMode()">🌙</button>
</div>

<div class="card p-3 text-dark mb-3">
<input type="hidden" id="id">
<input id="name" class="form-control mb-2" placeholder="Name">
<input id="age" type="number" class="form-control mb-2" placeholder="Age">
<select id="dept" class="form-control mb-2">
<option>IT</option>
<option>CSE</option>
<option>ECE</option>
</select>
<input id="email" class="form-control mb-2" placeholder="Email">

<button class="btn btn-primary w-100" onclick="save()">Save</button>
</div>

<table class="table table-bordered text-dark">
<thead class="table-dark">
<tr><th>Name</th><th>Age</th><th>Dept</th><th>Email</th><th>Action</th></tr>
</thead>
<tbody id="tb"></tbody>
</table>

<div class="text-center">
<button class="btn btn-dark" onclick="prev()">Prev</button>
<button class="btn btn-dark" onclick="next()">Next</button>
</div>

<div id="toast" class="position-fixed bottom-0 end-0 p-3 text-white rounded"></div>

</div>
</div>

<script src="app.js"></script>
</body>
</html>
